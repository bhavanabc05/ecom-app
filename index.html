<!DOCTYPE html>
<html>
<head>
  <title>Jewellery Store</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f9f9f9;
    }

    h1 {
      color: #b8860b;
    }

    .search-box {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .suggestions {
      border: 1px solid #ccc;
      width: 300px;
      position: absolute;
      background: white;
      z-index: 1000;
    }

    .suggestion-item {
      padding: 8px;
      display: flex;
      gap: 10px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      width: 200px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: #b8860b;
      color: white;
      border: none;
      padding: 6px 10px;
      margin-top: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #a37400;
    }
  </style>
</head>
<body>

<h1>💎 Jewellery Store</h1>

<input id="search" class="search-box" placeholder="Search jewellery..." oninput="searchProduct()">
<div id="suggestions" class="suggestions"></div>

<br><br>
<button onclick="loadAll()">Show Jewellery</button>

<h2>Products</h2>
<div id="products" class="products"></div>

<h2>🛍️ Cart</h2>
<ul id="cart"></ul>
<h3 id="total"></h3>
<button onclick="checkout()">Checkout</button>

<script>
let cart = [];

// SEARCH
async function searchProduct() {
  const q = search.value;

  if (!q) {
    suggestions.innerHTML = "";
    return;
  }

  const res = await fetch("/search?q=" + q);
  const data = await res.json();

  suggestions.innerHTML = "";

  data.forEach(p => {
    suggestions.innerHTML += `
      <div class="suggestion-item" onclick='selectProduct(${JSON.stringify(p)})'>
        <img src="${p.image}" width="40">
        <span>${p.name}</span>
      </div>
    `;
  });
}

// SELECT PRODUCT
function selectProduct(p) {
  suggestions.innerHTML = "";

  products.innerHTML = `
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
    </div>
  `;
}

// LOAD ALL
async function loadAll() {
  const res = await fetch("/products");
  const data = await res.json();

  products.innerHTML = "";

  data.forEach(p => {
    products.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
      </div>
    `;
  });
}

// ADD TO CART
function addToCart(p) {
  cart.push(p);
  renderCart();
}

// RENDER CART
function renderCart() {
  const cartUI = document.getElementById("cart");
  cartUI.innerHTML = "";

  let total = 0;

  cart.forEach((item, i) => {
    total += Number(item.price);

    cartUI.innerHTML += `
      <li>
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${i})">Remove</button>
      </li>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

// REMOVE
function removeItem(i) {
  cart.splice(i, 1);
  renderCart();
}

// CHECKOUT
async function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let total = cart.reduce((sum, item) => sum + Number(item.price), 0);

  await fetch("/order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ items: cart, total })
  });

  alert("✅ Order placed!");
  cart = [];
  renderCart();
}

// INIT
loadAll();
</script>

</body>
</html>
